<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QBO Categorizer</title>
  <style>
    :root {
      --primary: #1B365D;       /* Primary Navy */
      --primary-dark: #142849;
      --accent: #00A3E0;        /* Accent Blue */
      --accent-dark: #0089bd;
      --text: #4A4A4A;          /* Body Text */
      --bg: #FFFFFF;            /* Background */
      --section-bg: #F4F7F9;    /* Section BG */
      --card: #FFFFFF;
      --border: #D9E2EA;
      --muted: #6B7C8E;
      --success: #1B365D;
      --warn: #D97706;
      --error: #DC2626;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--section-bg); }
    body {
      width: 392px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: var(--text);
      line-height: 1.4;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      background: var(--primary);
      color: white;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 8px 20px rgba(27, 54, 93, 0.16);
    }
    header .title {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    header .title svg { opacity: .9; }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
    }
    .status-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 500;
      background: rgba(255,255,255,.16);
      padding: 4px 9px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .status-dot::before {
      content: '';
      width: 7px; height: 7px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(255,255,255,.5);
    }
    .status-dot.ok::before     { background: #6FE3C5; }
    .status-dot.warn::before   { background: #FFD96D; }
    .status-dot.err::before    { background: #FF8585; }

    /* ── Sections ───────────────────────────────────── */
    main { padding: 14px; display: flex; flex-direction: column; gap: 12px; background: var(--section-bg); }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 1px 3px rgba(27, 54, 93, 0.06);
    }
    .card h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 11px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── Run Now button ─────────────────────────────── */
    .btn-run {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      min-height: 44px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .01em;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all .15s;
      box-shadow: 0 3px 8px rgba(0, 163, 224, 0.25);
    }
    .btn-run:hover:not(:disabled) {
      background: var(--accent-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0, 163, 224, 0.35);
    }
    .btn-run:active:not(:disabled) { transform: translateY(0); }
    .btn-run:disabled { opacity: .55; cursor: progress; }
    .btn-run .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: none;
    }
    .btn-run.loading .spinner { display: inline-block; }
    .btn-run.loading .play-icon { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Compact form controls ──────────────────────── */
    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .row:last-child { margin-bottom: 0; }
    .row label {
      flex: 1;
      font-size: 13px;
      color: var(--text);
    }
    .row .label-sub {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* Switch */
    .switch {
      position: relative;
      width: 36px; height: 20px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccd1d6;
      border-radius: 999px;
      transition: .2s;
    }
    .switch .slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: .2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    .switch input:checked + .slider { background: var(--accent); }
    .switch input:checked + .slider::before { transform: translateX(16px); }

    /* Inputs */
    input[type="time"], input[type="text"], input[type="url"] {
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      background: white;
      width: 100%;
      font-family: inherit;
      color: var(--text);
    }
    input[type="time"] { width: 100px; }
    input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }
    .field-label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 6px;
    }
    .helper {
      margin-top: 7px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }
    .mini-env-toggle {
      display: grid;
      grid-template-columns: repeat(2, 28px);
      gap: 2px;
      background: rgba(255, 255, 255, .14);
      border: 1px solid rgba(255, 255, 255, .22);
      padding: 2px;
      border-radius: 999px;
    }
    .mini-env-option {
      position: relative;
      display: block;
    }
    .mini-env-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .mini-env-option span {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 22px;
      border-radius: 999px;
      color: rgba(255, 255, 255, .72);
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }
    .mini-env-option input:checked + span {
      background: white;
      color: var(--primary);
      box-shadow: 0 1px 4px rgba(0, 0, 0, .16);
    }
    .hidden-control { display: none !important; }

    /* ── Last run ───────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .stat {
      background: var(--section-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 6px;
      text-align: center;
    }
    .stat .num {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.02em;
    }
    .stat .num.ok    { color: var(--accent); }
    .stat .num.warn  { color: var(--warn); }
    .stat .num.muted { color: var(--muted); }
    .stat .lbl {
      display: block;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .02em;
      margin-top: 2px;
    }
    .meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
    }
    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 999px;
      font-weight: 600;
    }
    .badge.ok    { background: #E0F4FA; color: var(--accent-dark); }
    .badge.err   { background: #FDE8E8; color: var(--error); }
    .badge.warn  { background: #FFF4D6; color: var(--warn); }
    .badge.muted { background: var(--section-bg); color: var(--muted); }

    /* ── Empty / banner ─────────────────────────────── */
    .banner {
      background: #FFF8DB;
      color: #7A5B00;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 12px;
      display: flex;
      gap: 8px;
      align-items: flex-start;
      border: 1px solid #F5E6A8;
    }
    .banner.err {
      background: #FDECEC;
      color: #8A1F1F;
      border-color: #F5C8C8;
    }
    .banner svg { flex-shrink: 0; margin-top: 1px; }

    details { margin-top: 10px; }
    details summary {
      font-size: 11px;
      color: var(--accent);
      cursor: pointer;
      list-style: none;
      user-select: none;
      font-weight: 600;
    }
    details summary:hover { color: var(--accent-dark); }
    details summary::-webkit-details-marker { display: none; }
    details summary::before { content: '▸ '; }
    details[open] summary::before { content: '▾ '; }
    details > div {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
    }
    .link-btn {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--primary);
      cursor: pointer;
      font-size: 13px;
      padding: 10px 12px;
      font-family: inherit;
      font-weight: 600;
      border-radius: 8px;
      transition: all .15s;
    }
    .link-btn:hover { color: var(--accent-dark); border-color: var(--accent); background: #F8FBFD; }
  </style>
</head>
<body>
  <header>
    <div class="title">
      <svg width="20" height="20" viewBox="0 0 128 128" fill="none" aria-hidden="true">
        <rect x="8" y="8" width="112" height="112" rx="28" fill="white" fill-opacity=".16"/>
        <circle cx="64" cy="64" r="42" fill="#00A3E0" fill-opacity=".18"/>
        <circle cx="28" cy="38" r="5" fill="#00A3E0"/>
        <circle cx="28" cy="61" r="5" fill="#00A3E0"/>
        <circle cx="28" cy="84" r="5" fill="#00A3E0"/>
        <rect x="39" y="33" width="54" height="10" rx="5" fill="white" fill-opacity=".92"/>
        <rect x="39" y="56" width="43" height="10" rx="5" fill="white" fill-opacity=".88"/>
        <rect x="39" y="79" width="34" height="10" rx="5" fill="white" fill-opacity=".84"/>
        <path d="M52 72L65 85L94 53" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M52 72L65 85L94 53" stroke="#00A3E0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      QBO Categorizer
    </div>
    <div class="header-actions">
      <div id="status-pill" class="status-dot">Ready</div>
      <div class="mini-env-toggle" role="radiogroup" aria-label="QuickBooks environment">
        <label class="mini-env-option" title="Sandbox">
          <input id="qbo-env-sandbox" type="radio" name="qbo-environment" value="sandbox" checked />
          <span>S</span>
        </label>
        <label class="mini-env-option" title="Production">
          <input id="qbo-env-production" type="radio" name="qbo-environment" value="production" />
          <span>P</span>
        </label>
      </div>
    </div>
  </header>

  <main>
    <div id="banner" style="display:none"></div>

    <button id="btn-run" class="btn-run" type="button">
      <svg class="play-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <div class="spinner"></div>
      <span class="label">Run Now</span>
    </button>

    <div class="card">
      <h3>Last run <span id="last-run-when" class="meta" style="margin:0"></span></h3>
      <div id="last-run">
        <div class="meta" style="margin: 0; padding: 6px 0; color: var(--muted)">No runs yet.</div>
      </div>
    </div>

    <span id="next-run-text" class="hidden-control">Off</span>
    <input id="schedule-enabled" class="hidden-control" type="checkbox" />
    <input id="schedule-time" class="hidden-control" type="time" value="09:00" />

    <div class="card">
      <h3>Bookkeep endpoint</h3>
      <label class="field-label" for="backend-url">LLM categorization API</label>
      <input id="backend-url" type="url" placeholder="http://localhost:3001/api/llm/qbo-categorize" />
      <p class="helper">Uncategorized QBO rows are sent here for LLM categorization.</p>
    </div>

    <div>
      <button id="btn-open" class="link-btn" type="button">Open QBO Banking ↗</button>
    </div>
  </main>

  <script type="module" src="popup.ts"></script>
</body>
</html>
